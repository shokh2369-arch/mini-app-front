<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trip Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; }
    #map { position: absolute; top: 0; left: 0; right: 0; bottom: 56px; }
    #controls {
      position: absolute; left: 0; right: 0; bottom: 0; height: 56px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 8px; background: #fff; border-top: 1px solid #ddd;
    }
    #controls button {
      padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px;
      background: #2563eb; color: #fff; font-weight: 600; cursor: pointer;
    }
    #controls button:disabled { background: #94a3b8; cursor: not-allowed; }
    #controls button.finish { background: #dc2626; }
    #status { font-size: 14px; color: #64748b; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="controls">
    <span id="status">Loading…</span>
    <button id="btnStart" type="button" style="display:none;">START TRIP</button>
    <button id="btnFinish" type="button" class="finish" style="display:none;">FINISH TRIP</button>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="map.js"></script>
</body>
</html>
